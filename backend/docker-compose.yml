name: obhod-backend

services:
  traefik:
    image: traefik:v3.1
    container_name: obhod-traefik
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --log.level=INFO
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    depends_on:
      auth-service:
        condition: service_started
      field-service:
        condition: service_started
      report-service:
        condition: service_started
    networks:
      - obhod

  postgres:
    image: postgres:16-alpine
    container_name: obhod-postgres
    environment:
      POSTGRES_USER: obhod
      POSTGRES_PASSWORD: obhod
      POSTGRES_DB: obhod
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obhod -d obhod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - obhod

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: obhod-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - obhod

  redpanda:
    image: redpandadata/redpanda:v24.3.6
    container_name: obhod-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - obhod

  auth-service:
    build:
      context: ./services/auth-service
    container_name: obhod-auth-service
    environment:
      SERVICE_NAME: auth-service
      DATABASE_URL: postgresql://obhod:obhod@postgres:5432/obhod
      DEV_AUTH_TOKEN: dev-token
      DEV_ADMIN_TOKEN: dev-admin-token
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - obhod

  field-service:
    build:
      context: ./services/field-service
    container_name: obhod-field-service
    environment:
      SERVICE_NAME: field-service
      DATABASE_URL: postgresql://obhod:obhod@postgres:5432/obhod
      MINIO_ENDPOINT: http://minio:9000
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - obhod

  report-service:
    build:
      context: ./services/report-service
    container_name: obhod-report-service
    environment:
      SERVICE_NAME: report-service
      DATABASE_URL: postgresql://obhod:obhod@postgres:5432/obhod
      MINIO_ENDPOINT: http://minio:9000
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - obhod

networks:
  obhod:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  redpanda-data:
