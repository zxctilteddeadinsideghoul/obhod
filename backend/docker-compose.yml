name: ${COMPOSE_PROJECT_NAME:-obhod-backend}

services:
  traefik:
    image: traefik:v3.1
    container_name: obhod-traefik
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --log.level=INFO
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    depends_on:
      auth-service:
        condition: service_healthy
      field-service:
        condition: service_healthy
      report-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - obhod

  postgres:
    image: postgres:16-alpine
    container_name: obhod-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-obhod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-obhod}
      POSTGRES_DB: ${POSTGRES_DB:-obhod}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-obhod} -d $${POSTGRES_DB:-obhod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - obhod

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: obhod-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - obhod

  redpanda:
    image: ${REDPANDA_IMAGE:-redpandadata/redpanda:v24.3.6}
    container_name: obhod-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "${REDPANDA_EXTERNAL_PORT:-19092}:19092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - obhod

  auth-service:
    build:
      context: ./services/auth-service
    container_name: obhod-auth-service
    environment:
      SERVICE_NAME: ${AUTH_SERVICE_NAME:-auth-service}
      DATABASE_URL: ${DATABASE_URL:-postgresql://obhod:obhod@postgres:5432/obhod}
      DEV_AUTH_TOKEN: ${DEV_AUTH_TOKEN:-dev-token}
      DEV_ADMIN_TOKEN: ${DEV_ADMIN_TOKEN:-dev-admin-token}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      ACCESS_TOKEN_TTL_SEC: ${ACCESS_TOKEN_TTL_SEC:-43200}
      WORKER_LOGIN: ${WORKER_LOGIN:-worker}
      WORKER_PASSWORD: ${WORKER_PASSWORD:-worker123}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/auth/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - obhod

  field-service:
    build:
      context: ./services/field-service
    container_name: obhod-field-service
    environment:
      SERVICE_NAME: ${FIELD_SERVICE_NAME:-field-service}
      DATABASE_URL: ${DATABASE_URL:-postgresql://obhod:obhod@postgres:5432/obhod}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-obhod-media}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/field/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - obhod

  field-migrations:
    build:
      context: ./services/field-service
    container_name: obhod-field-migrations
    command: alembic upgrade head
    profiles:
      - tools
    environment:
      SERVICE_NAME: ${FIELD_SERVICE_NAME:-field-service}
      DATABASE_URL: ${DATABASE_URL:-postgresql://obhod:obhod@postgres:5432/obhod}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-obhod-media}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - obhod

  report-service:
    build:
      context: ./services/report-service
    container_name: obhod-report-service
    environment:
      SERVICE_NAME: ${REPORT_SERVICE_NAME:-report-service}
      DATABASE_URL: ${DATABASE_URL:-postgresql://obhod:obhod@postgres:5432/obhod}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/reports/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - obhod

networks:
  obhod:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  redpanda-data:
